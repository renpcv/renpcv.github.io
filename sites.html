<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Sites</title>

        <!-- Cesium CSS + JS -->
        <link
            href="https://cesium.com/downloads/cesiumjs/releases/1.124/Build/Cesium/Widgets/widgets.css"
            rel="stylesheet"
        />
        <script src="https://cesium.com/downloads/cesiumjs/releases/1.124/Build/Cesium/Cesium.js"></script>

        <style>
            :root {
                --fg: #f2f2f2;
                --fg-dim: rgba(242, 242, 242, 0.72);
                --bg-glass: rgba(18, 18, 20, 0.55);
                --border-glass: rgba(255, 255, 255, 0.08);
                --accent: #ffffff;
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            html,
            body {
                width: 100%;
                height: 100%;
                overflow: hidden;
                background: #000;
                color: var(--fg);
                font-family:
                    -apple-system, "Helvetica Neue", Helvetica, Arial,
                    sans-serif;
                font-feature-settings: "kern" 1;
                -webkit-font-smoothing: antialiased;
            }

            /* Cesium container — full-screen background */
            #cesiumContainer {
                position: fixed;
                inset: 0;
                width: 100vw;
                height: 100vh;
                z-index: 0;
                background: #000;
            }

            /* Hide all Cesium UI widgets — we want a pure background view */
            .cesium-viewer-toolbar,
            .cesium-viewer-animationContainer,
            .cesium-viewer-timelineContainer,
            .cesium-viewer-fullscreenContainer,
            .cesium-viewer-bottom,
            .cesium-viewer-geocoderContainer,
            .cesium-viewer-navigationContainer,
            .cesium-widget-credits {
                display: none !important;
            }

            /* BUT: Google ToS requires data attribution to be visible.
     We move it to a small, unobtrusive corner. */
            .cesium-credit-lightbox-overlay {
                display: none !important;
            }
            #credit-container {
                position: fixed;
                bottom: 8px;
                right: 12px;
                z-index: 100;
                font-size: 10px;
                color: rgba(255, 255, 255, 0.55);
                text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
                pointer-events: none;
                font-family: -apple-system, Helvetica, Arial, sans-serif;
            }
            #credit-container a {
                color: rgba(255, 255, 255, 0.7);
                text-decoration: none;
                pointer-events: auto;
            }

            /* Subtle dark vignette over the map */
            #vignette {
                position: fixed;
                inset: 0;
                z-index: 1;
                pointer-events: none;
                background:
                    radial-gradient(
                        ellipse at center,
                        transparent 55%,
                        rgba(0, 0, 0, 0.55) 100%
                    ),
                    linear-gradient(
                        to bottom,
                        rgba(0, 0, 0, 0.15) 0%,
                        transparent 25%,
                        transparent 75%,
                        rgba(0, 0, 0, 0.35) 100%
                    );
            }

            /* Loading screen */
            #loading {
                position: fixed;
                inset: 0;
                z-index: 200;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #000;
                color: var(--fg-dim);
                font-size: 11px;
                letter-spacing: 0.25em;
                text-transform: uppercase;
                transition: opacity 1.2s ease;
            }
            #loading.hidden {
                opacity: 0;
                pointer-events: none;
            }

            /* Left overlay (user-supplied PNG) */
            #left-overlay {
                position: fixed;
                left: 32px;
                top: 50%;
                transform: translateY(-50%);
                z-index: 10;
                max-height: 75vh;
                max-width: 32vw;
                pointer-events: none;
                user-select: none;
                -webkit-user-drag: none;
                filter: drop-shadow(0 2px 12px rgba(0, 0, 0, 0.6));
                opacity: 0;
                transition: opacity 0.4s ease;
            }
            #left-overlay.loaded {
                opacity: 1;
            }

            /* Title — lower center */
            #title {
                position: fixed;
                left: 50%;
                bottom: 72px;
                transform: translateX(-50%);
                z-index: 10;
                font-style: italic;
                font-weight: 400;
                font-size: clamp(28px, 3.2vw, 44px);
                letter-spacing: 0.01em;
                color: #fff;
                text-shadow: 0 2px 14px rgba(0, 0, 0, 0.75);
                pointer-events: none;
                white-space: nowrap;
            }

            /* NEXT button — lower right */
            #next-btn {
                position: fixed;
                right: 32px;
                bottom: 32px;
                z-index: 20;
                padding: 14px 28px;
                background: #000;
                color: #fff;
                border: none;
                font-family: inherit;
                font-size: 14px;
                font-weight: 600;
                letter-spacing: 0.15em;
                cursor: pointer;
                transition:
                    transform 0.15s ease,
                    background 0.15s ease;
                user-select: none;
            }
            #next-btn:hover {
                background: #1a1a1a;
                transform: translateY(-1px);
            }
            #next-btn:active {
                transform: translateY(0);
            }

            /* Document stack — upper right */
            #docs {
                position: fixed;
                top: 80px;
                right: 100px;
                width: clamp(220px, 22vw, 320px);
                aspect-ratio: 8.5 / 11;
                z-index: 10;
                perspective: 1200px;
            }
            #docs .page {
                position: absolute;
                inset: 0;
                background: #fff no-repeat center / contain;
                box-shadow:
                    0 8px 28px rgba(0, 0, 0, 0.55),
                    0 2px 6px rgba(0, 0, 0, 0.4);
                transition: opacity 0.2s ease;
            }

            /* Document flip buttons */
            .doc-arrow {
                position: fixed;
                top: 50%;
                transform: translateY(-50%);
                z-index: 20;
                width: 48px;
                height: 48px;
                background: #000;
                color: #fff;
                border: none;
                font-family: inherit;
                font-size: 18px;
                font-weight: 700;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition:
                    background 0.15s ease,
                    opacity 0.2s ease;
                user-select: none;
            }
            .doc-arrow:hover {
                background: #1a1a1a;
            }
            .doc-arrow:disabled {
                opacity: 0.25;
                cursor: default;
            }
            #doc-prev {
                right: calc(100px + clamp(220px, 22vw, 320px) + 24px);
                top: calc(80px + (clamp(220px, 22vw, 320px) * 11 / 8.5) / 2);
            }
            #doc-next {
                right: 40px;
                top: calc(80px + (clamp(220px, 22vw, 320px) * 11 / 8.5) / 2);
            }

            /* API key warning */
            #api-warning {
                position: fixed;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
                z-index: 300;
                padding: 14px 24px;
                background: rgba(180, 30, 30, 0.92);
                color: #fff;
                font-size: 13px;
                letter-spacing: 0.05em;
                display: none;
                max-width: 80vw;
                text-align: center;
            }
            #api-warning.show {
                display: block;
            }
        </style>
    </head>
    <body>
        <div id="cesiumContainer"></div>
        <div id="vignette"></div>
        <div id="credit-container"></div>

        <div id="loading">LOADING</div>

        <div id="api-warning">
            Cesium/Google Maps API key not set. Open <code>sites.html</code> and
            replace <code>YOUR_GOOGLE_API_KEY</code> near the top of the
            &lt;script&gt; block.
        </div>

        <img id="left-overlay" alt="" />

        <div id="docs">
            <!-- Pages inserted dynamically (bottom → top order) -->
        </div>
        <button class="doc-arrow" id="doc-prev" aria-label="Previous page">
            &lt;
        </button>
        <button class="doc-arrow" id="doc-next" aria-label="Next page">
            &gt;
        </button>

        <div id="title"></div>

        <button id="next-btn">NEXT</button>

        <script>
            // ===========================================================================
            // CONFIG — replace with your Google Maps Platform API key.
            // Make sure the "Map Tiles API" is enabled for this key in Google Cloud
            // Console, and that HTTP referrer restrictions include your GitHub Pages URL.
            // ===========================================================================
            const GOOGLE_API_KEY = "AIzaSyC10MtfXs-6wYQa8WEh8kf2AtIXkodq3eE";

            // Orbit behavior
            const ORBIT_ALTITUDE_M = 250; // camera height above the point (meters)
            const ORBIT_RADIUS_M = 350; // horizontal distance from the point (meters)
            const ORBIT_PITCH_DEG = -25; // tilt: 0 = horizontal, -90 = straight down
            const ORBIT_SECONDS = 120; // time for one full revolution
            const PAUSE_AFTER_SWITCH = 800; // ms to wait after NEXT before resuming orbit

            // ===========================================================================

            if (!GOOGLE_API_KEY || GOOGLE_API_KEY === "YOUR_GOOGLE_API_KEY") {
                document.getElementById("api-warning").classList.add("show");
            }

            // --- Load coordinates.txt -------------------------------------------------
            async function loadCoordinates() {
                const res = await fetch("maps/coordinates.txt", {
                    cache: "no-cache",
                });
                const text = await res.text();
                return text
                    .split("\n")
                    .map((l) => l.trim())
                    .filter((l) => l && !l.startsWith("#"))
                    .map((l) => {
                        const [coord, title, slug] = l
                            .split("|")
                            .map((s) => s.trim());
                        const [lat, lng] = coord.split(",").map(Number);
                        return { lat, lng, title, slug };
                    });
            }

            // --- Auto-discover document pages for a slug ------------------------------
            // Handles both naming conventions:
            //   - page1.png, page2.png, ...  (when a folder has <10 pages)
            //   - page01.png, page02.png, ... (when a folder has >=10 pages)
            // At each index it tries both forms, so mixed folders also work.
            async function discoverPages(slug) {
                const pages = [];
                const base = `maps/documents/${slug}`;

                for (let i = 1; i <= 99; i++) {
                    const unpadded = `${base}/page${i}.png`;
                    const padded = `${base}/page${String(i).padStart(2, "0")}.png`;

                    let found = null;
                    if (await imageExists(unpadded)) found = unpadded;
                    else if (i >= 10 && (await imageExists(padded)))
                        found = padded;
                    // For i < 10, also check padded form (page01, page02, ...)
                    else if (i < 10 && (await imageExists(padded)))
                        found = padded;

                    if (!found) break;
                    pages.push(found);
                }
                return pages;
            }

            function imageExists(url) {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => resolve(true);
                    img.onerror = () => resolve(false);
                    img.src = url;
                });
            }

            // ==========================================================================
            // CESIUM SETUP
            // ==========================================================================
            let viewer, currentTileset;
            let currentSite = null;
            let orbitHeading = 0; // radians, increases over time
            let orbitPaused = false;
            let lastFrameTime = null;

            async function initCesium() {
                viewer = new Cesium.Viewer("cesiumContainer", {
                    globe: false,
                    baseLayerPicker: false,
                    geocoder: false,
                    homeButton: false,
                    sceneModePicker: false,
                    navigationHelpButton: false,
                    animation: false,
                    timeline: false,
                    fullscreenButton: false,
                    infoBox: false,
                    selectionIndicator: false,
                    creditContainer: "credit-container",
                });

                // Black space background
                viewer.scene.skyBox.show = false;
                viewer.scene.skyAtmosphere.show = false;
                viewer.scene.backgroundColor = Cesium.Color.BLACK;

                // Better tile loading performance
                Cesium.RequestScheduler.requestsByServer[
                    "tile.googleapis.com:443"
                ] = 18;

                // Disable user camera controls — this is a background, not an explorer
                viewer.scene.screenSpaceCameraController.enableInputs = false;

                // Load Google Photorealistic 3D Tiles
                try {
                    currentTileset = await Cesium.Cesium3DTileset.fromUrl(
                        `https://tile.googleapis.com/v1/3dtiles/root.json?key=${GOOGLE_API_KEY}`,
                        { showCreditsOnScreen: true },
                    );
                    viewer.scene.primitives.add(currentTileset);
                } catch (err) {
                    console.error("Failed to load Google 3D Tiles:", err);
                    document.getElementById("loading").textContent =
                        "FAILED TO LOAD MAP";
                    return false;
                }

                // Drive the orbit every frame
                viewer.scene.postRender.addEventListener(updateOrbit);
                return true;
            }

            function updateOrbit(scene, time) {
                if (!currentSite) return;

                const now = performance.now();
                if (lastFrameTime === null) lastFrameTime = now;
                const dt = (now - lastFrameTime) / 1000;
                lastFrameTime = now;

                if (!orbitPaused) {
                    orbitHeading += ((2 * Math.PI) / ORBIT_SECONDS) * dt;
                    if (orbitHeading > 2 * Math.PI) orbitHeading -= 2 * Math.PI;
                }

                positionCameraForOrbit();
            }

            function positionCameraForOrbit() {
                // Target point (ground level at the coordinate)
                const target = Cesium.Cartesian3.fromDegrees(
                    currentSite.lng,
                    currentSite.lat,
                    0,
                );

                // Compute camera position: offset from target in its local ENU frame.
                // X = east, Y = north, Z = up. We rotate around Z by orbitHeading.
                const localOffset = new Cesium.Cartesian3(
                    ORBIT_RADIUS_M * Math.cos(orbitHeading),
                    ORBIT_RADIUS_M * Math.sin(orbitHeading),
                    ORBIT_ALTITUDE_M,
                );
                const enuMatrix =
                    Cesium.Transforms.eastNorthUpToFixedFrame(target);
                const cameraPos = Cesium.Matrix4.multiplyByPoint(
                    enuMatrix,
                    localOffset,
                    new Cesium.Cartesian3(),
                );

                // Direction vector from camera to target (in world coords)
                const direction = Cesium.Cartesian3.subtract(
                    target,
                    cameraPos,
                    new Cesium.Cartesian3(),
                );
                Cesium.Cartesian3.normalize(direction, direction);

                // Convert that world-space direction into heading/pitch at the camera's
                // location. Cesium provides a helper for this via the camera's local frame.
                // We build the ENU frame AT THE CAMERA position, then express direction in
                // that frame to extract heading/pitch.
                const camEnu =
                    Cesium.Transforms.eastNorthUpToFixedFrame(cameraPos);
                const camEnuInv = Cesium.Matrix4.inverseTransformation(
                    camEnu,
                    new Cesium.Matrix4(),
                );
                const localDir = Cesium.Matrix4.multiplyByPointAsVector(
                    camEnuInv,
                    direction,
                    new Cesium.Cartesian3(),
                );
                // localDir is now (east, north, up) at the camera.
                // heading: angle from north, clockwise.  pitch: angle above horizon.
                const heading = Math.atan2(localDir.x, localDir.y);
                const pitch = Math.asin(localDir.z);

                viewer.camera.setView({
                    destination: cameraPos,
                    orientation: { heading, pitch, roll: 0 },
                });
            }

            // ==========================================================================
            // SITE SWITCHING
            // ==========================================================================
            let sites = [];
            let siteIndex = 0;
            let currentPages = [];
            let pageIndex = 0;

            async function loadSite(index) {
                currentSite = sites[index];
                siteIndex = index;

                // Title
                document.getElementById("title").textContent =
                    currentSite.title;

                // Left overlay
                const leftOverlay = document.getElementById("left-overlay");
                leftOverlay.classList.remove("loaded");
                const overlayUrl = `maps/overlays/${currentSite.slug}.png`;
                const hasOverlay = await imageExists(overlayUrl);
                if (hasOverlay) {
                    leftOverlay.src = overlayUrl;
                    leftOverlay.onload = () =>
                        leftOverlay.classList.add("loaded");
                } else {
                    leftOverlay.src = "";
                }

                // Documents
                currentPages = await discoverPages(currentSite.slug);
                pageIndex = 0;
                renderPages();

                // Pause the orbit briefly so the transition feels deliberate
                orbitPaused = true;
                setTimeout(() => {
                    orbitPaused = false;
                }, PAUSE_AFTER_SWITCH);

                // Snap camera to new site immediately (hard cut)
                positionCameraForOrbit();
            }

            // --- Document page rendering ---------------------------------------------
            function renderPages() {
                const docs = document.getElementById("docs");
                docs.innerHTML = "";

                if (currentPages.length === 0) {
                    document.getElementById("doc-prev").style.display = "none";
                    document.getElementById("doc-next").style.display = "none";
                    return;
                }
                document.getElementById("doc-prev").style.display = "";
                document.getElementById("doc-next").style.display = "";

                // Show up to 3 pages stacked: [current-2, current-1, current]
                // Background pages are slightly rotated/offset for the "stack" look.
                const stackSize = Math.min(3, currentPages.length - pageIndex);
                const offsets = [
                    { rot: -4, x: -14, y: 10 }, // deepest
                    { rot: 3, x: 10, y: 5 }, // middle
                    { rot: 0, x: 0, y: 0 }, // top (current)
                ];

                for (let i = stackSize - 1; i >= 0; i--) {
                    const srcIndex = pageIndex + i;
                    if (srcIndex >= currentPages.length) continue;
                    const offset = offsets[stackSize - 1 - i];
                    const page = document.createElement("div");
                    page.className = "page";
                    page.style.backgroundImage = `url("${currentPages[srcIndex]}")`;
                    page.style.transform = `translate(${offset.x}px, ${offset.y}px) rotate(${offset.rot}deg)`;
                    page.style.zIndex = 10 - i;
                    docs.appendChild(page);
                }

                // Update arrow disabled states
                document.getElementById("doc-prev").disabled = pageIndex === 0;
                document.getElementById("doc-next").disabled =
                    pageIndex >= currentPages.length - 1;
            }

            // ==========================================================================
            // UI WIRING
            // ==========================================================================
            document
                .getElementById("next-btn")
                .addEventListener("click", () => {
                    const nextIndex = (siteIndex + 1) % sites.length;
                    loadSite(nextIndex);
                });

            document
                .getElementById("doc-prev")
                .addEventListener("click", () => {
                    if (pageIndex > 0) {
                        pageIndex--;
                        renderPages();
                    }
                });

            document
                .getElementById("doc-next")
                .addEventListener("click", () => {
                    if (pageIndex < currentPages.length - 1) {
                        pageIndex++;
                        renderPages();
                    }
                });

            // ==========================================================================
            // BOOT
            // ==========================================================================
            (async () => {
                try {
                    sites = await loadCoordinates();
                    if (sites.length === 0) {
                        document.getElementById("loading").textContent =
                            "NO COORDINATES FOUND";
                        return;
                    }

                    const ok = await initCesium();
                    if (!ok) return;

                    await loadSite(0);

                    // Give tiles a moment to stream in before revealing
                    setTimeout(() => {
                        document
                            .getElementById("loading")
                            .classList.add("hidden");
                    }, 2500);
                } catch (err) {
                    console.error(err);
                    document.getElementById("loading").textContent =
                        "ERROR — CHECK CONSOLE";
                }
            })();
        </script>
    </body>
</html>
