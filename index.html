<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rooms</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@1,700&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    cursor: none;
  }

  #cursor {
    position: fixed;
    width: 7px; height: 7px;
    background: rgba(255,255,255,0.9);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    mix-blend-mode: difference;
    transition: width 0.15s, height 0.15s;
  }

  /* ── Video layer ── */
  #video-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    background: #000;
  }

  #video-bg iframe {
    position: absolute;
    top: 50%; left: 50%;
    width: 237vh;
    height: 133vh;
    min-width: 133vw;
    min-height: 75vw;
    transform: translate(-50%, -50%);
    pointer-events: none;
    border: none;
  }

  #video-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.5) 100%);
    pointer-events: none;
  }

  /* ── Canvas layer ── */
  #three-canvas {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }

  /* ── UI layer ── */
  #ui {
    position: fixed;
    inset: 0;
    z-index: 10;
    pointer-events: none;
  }

  .ctrl {
    pointer-events: all;
    background: #000;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    border: 1.5px solid #fff;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-style: italic;
    font-size: 20px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: none;
    transition: background 0.2s, color 0.2s;
  }

  .ctrl:hover {
    background: #fff;
    border-color: #fff;
    color: #000;
  }

  /* Top-left: sliders panel */
  #slider-wrap {
    position: absolute;
    top: 36px; left: 36px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    pointer-events: all;
  }

  .slider-row {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .slider-label {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-style: italic;
    font-size: 20px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #fff;
  }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 160px;
    height: 1px;
    background: rgba(255,255,255,0.2);
    outline: none;
    cursor: none;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 9px; height: 9px;
    background: rgba(255,255,255,0.85);
    border-radius: 50%;
    cursor: none;
    transition: transform 0.15s;
  }

  input[type=range]:hover::-webkit-slider-thumb { transform: scale(1.5); }

  input[type=range]::-moz-range-thumb {
    width: 9px; height: 9px;
    background: rgba(255,255,255,0.85);
    border-radius: 50%;
    border: none;
    cursor: none;
  }

  /* Top-right: video counter */
  #video-counter {
    position: absolute;
    top: 36px; right: 36px;
    padding: 10px 16px;
    background: #000;
    border: 1.5px solid #fff;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-style: italic;
    font-size: 20px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #fff;
  }

  /* Bottom-left: mute */
  #btn-mute {
    position: absolute;
    bottom: 36px; left: 36px;
    padding: 11px 20px;
  }

  /* Bottom-right: next */
  #btn-next {
    position: absolute;
    bottom: 36px; right: 36px;
    padding: 11px 20px;
  }

  /* ── Now Playing text ── */
  #now-playing {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-style: italic;
    font-size: 60px;
    color: #fff;
    white-space: nowrap;
    z-index: 5;
    cursor: none;
    user-select: none;
    pointer-events: all;
  }
  #loading {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    transition: opacity 1s ease;
  }

  #loading.fade {
    opacity: 0;
    pointer-events: none;
  }

  #loading-word {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-style: italic;
    font-size: 20px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #fff;
  }

  #loading-track {
    width: 100px;
    height: 1px;
    background: #333;
    position: relative;
    overflow: hidden;
  }

  #loading-fill {
    position: absolute;
    top: 0; left: 0;
    height: 1px;
    background: #fff;
    width: 0%;
    transition: width 0.4s ease;
  }
</style>
</head>
<body>

<div id="cursor"></div>

<div id="now-playing">NOW PLAYING</div>

<div id="loading">
  <div id="loading-word">Loading</div>
  <div id="loading-track"><div id="loading-fill"></div></div>
</div>

<div id="video-bg">
  <div id="yt-player"></div>
</div>

<canvas id="three-canvas"></canvas>

<div id="ui">
  <div id="slider-wrap">
    <div class="slider-row">
      <div class="slider-label">Interior</div>
      <input type="range" id="interior-slider" min="0" max="100" value="0">
    </div>
    <div class="slider-row">
      <div class="slider-label">Size</div>
      <input type="range" id="size-slider" min="-100" max="100" value="0">
    </div>
    <div class="slider-row">
      <div class="slider-label">Count</div>
      <input type="range" id="count-slider" min="-100" max="100" value="0">
    </div>
    <div class="slider-row">
      <div class="slider-label">Speed</div>
      <input type="range" id="speed-slider" min="-100" max="100" value="0">
    </div>
  </div>

  <div id="video-counter">
    <span id="v-cur">01</span>&thinsp;/&thinsp;<span id="v-tot">09</span>
  </div>

  <button class="ctrl" id="btn-mute">Unmute</button>
  <button class="ctrl" id="btn-next">Next &rarr;</button>
</div>

<!-- YouTube IFrame API -->
<script>
// ── Draggable NOW PLAYING text ────────────────────────────────────────
const nowPlaying = document.getElementById('now-playing');
let npDragging = false;
let npOffsetX = 0, npOffsetY = 0;

// Convert from transform-centered to absolute position on first drag
function initNPPosition() {
  const rect = nowPlaying.getBoundingClientRect();
  nowPlaying.style.transform = 'none';
  nowPlaying.style.left = rect.left + 'px';
  nowPlaying.style.top = rect.top + 'px';
}

nowPlaying.addEventListener('mousedown', e => {
  if (nowPlaying.style.transform !== 'none' && nowPlaying.style.transform !== '') {
    initNPPosition();
  }
  npDragging = true;
  npOffsetX = e.clientX - nowPlaying.getBoundingClientRect().left;
  npOffsetY = e.clientY - nowPlaying.getBoundingClientRect().top;
  e.stopPropagation(); // prevent room drag from firing
});

window.addEventListener('mousemove', e => {
  if (!npDragging) return;
  nowPlaying.style.left = (e.clientX - npOffsetX) + 'px';
  nowPlaying.style.top  = (e.clientY - npOffsetY) + 'px';
});

window.addEventListener('mouseup', () => {
  npDragging = false;
});

// ── Cursor ────────────────────────────────────────────────────────────
const cur = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cur.style.left = e.clientX + 'px';
  cur.style.top = e.clientY + 'px';
});

// ── Videos ───────────────────────────────────────────────────────────
const VIDEO_IDS = [
  'Apo80x4Wzz8','0wvbBK9Nlsc','ShJvheZHXdI',
  'BtTlgxtoqhg','Q8K6HcbubTw'
];

let vidIndex = 0;
let muted = true;
let ytPlayer = null;

function pad(n) { return String(n+1).padStart(2,'0'); }
document.getElementById('v-tot').textContent = String(VIDEO_IDS.length).padStart(2,'0');

window.onYouTubeIframeAPIReady = function() {
  ytPlayer = new YT.Player('yt-player', {
    videoId: VIDEO_IDS[0],
    width: '100%', height: '100%',
    playerVars: {
      autoplay: 1, mute: 1, controls: 0,
      loop: 0, modestbranding: 1,
      rel: 0, iv_load_policy: 3,
      disablekb: 1, playsinline: 1
    },
    events: {
      onReady: ev => {
        ev.target.playVideo();
        triggerHide();
      },
      onStateChange: ev => {
        // Auto-advance when video ends
        if (ev.data === YT.PlayerState.ENDED) nextVideo();
      }
    }
  });
};

function triggerHide() {
  document.getElementById('loading-fill').style.width = '100%';
  setTimeout(() => document.getElementById('loading').classList.add('fade'), 500);
}

function nextVideo() {
  vidIndex = (vidIndex + 1) % VIDEO_IDS.length;
  document.getElementById('v-cur').textContent = pad(vidIndex);
  if (ytPlayer) {
    ytPlayer.loadVideoById(VIDEO_IDS[vidIndex]);
    if (muted) ytPlayer.mute();
    ytPlayer.playVideo();
  }
}

document.getElementById('btn-mute').addEventListener('click', () => {
  muted = !muted;
  document.getElementById('btn-mute').textContent = muted ? 'Unmute' : 'Mute';
  if (ytPlayer) muted ? ytPlayer.mute() : ytPlayer.unMute();
});

document.getElementById('btn-next').addEventListener('click', nextVideo);

// Load YT script
(function() {
  const s = document.createElement('script');
  s.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(s);
})();
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── Renderer ──────────────────────────────────────────────────────────
const canvas = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 0);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.z = 18;

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const d1 = new THREE.DirectionalLight(0xffffff, 0.85);
d1.position.set(6, 10, 6);
scene.add(d1);
const d2 = new THREE.DirectionalLight(0xe8eaf0, 0.3);
d2.position.set(-6, -4, -4);
scene.add(d2);

// ── Minimal STL Loader ────────────────────────────────────────────────
class STLLoader {
  load(url, cb, _p, onErr) {
    fetch(url)
      .then(r => { if (!r.ok) throw new Error(r.status); return r.arrayBuffer(); })
      .then(buf => cb(this.parse(buf)))
      .catch(e => { if (onErr) onErr(e); else console.warn('STL load failed:', url, e); });
  }

  parse(data) {
    return this._isBinary(data) ? this._parseBin(data) : this._parseASCII(data);
  }

  _isBinary(data) {
    const dv = new DataView(data);
    const declared = dv.getUint32(80, true);
    return data.byteLength === 84 + declared * 50;
  }

  _parseBin(data) {
    const dv = new DataView(data);
    const n = dv.getUint32(80, true);
    const pos = new Float32Array(n * 9);
    const nor = new Float32Array(n * 9);
    for (let i = 0; i < n; i++) {
      const off = 84 + i * 50;
      const nx = dv.getFloat32(off,    true);
      const ny = dv.getFloat32(off+4,  true);
      const nz = dv.getFloat32(off+8,  true);
      for (let v = 0; v < 3; v++) {
        const voff = off + 12 + v * 12;
        const idx  = i * 9 + v * 3;
        pos[idx]   = dv.getFloat32(voff,   true);
        pos[idx+1] = dv.getFloat32(voff+4, true);
        pos[idx+2] = dv.getFloat32(voff+8, true);
        nor[idx] = nx; nor[idx+1] = ny; nor[idx+2] = nz;
      }
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geo.setAttribute('normal',   new THREE.BufferAttribute(nor, 3));
    return geo;
  }

  _parseASCII(data) {
    const txt = new TextDecoder().decode(new Uint8Array(data));
    const pos = [], nor = [];
    const facetRe = /facet([\s\S]*?)endfacet/g;
    let m;
    while ((m = facetRe.exec(txt)) !== null) {
      const blk = m[1];
      const nv  = /normal\s+([\d+\-.e]+)\s+([\d+\-.e]+)\s+([\d+\-.e]+)/i.exec(blk);
      if (!nv) continue;
      for (const v of blk.matchAll(/vertex\s+([\d+\-.e]+)\s+([\d+\-.e]+)\s+([\d+\-.e]+)/gi)) {
        pos.push(+v[1], +v[2], +v[3]);
        nor.push(+nv[1], +nv[2], +nv[3]);
      }
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(pos), 3));
    geo.setAttribute('normal',   new THREE.BufferAttribute(new Float32Array(nor), 3));
    return geo;
  }
}

// ── Room definitions ──────────────────────────────────────────────────
const CONFIGS = [
  {
    shell: 'assets/room_large_A.stl',
    interiors: [
      'assets/room_large_A_interior_1.stl',
      'assets/room_large_A_interior_2.stl',
      'assets/room_large_A_interior_3.stl',
    ],
    scale: 0.015,
  },
  {
    shell: 'assets/room_medium_A.stl',
    interiors: [
      'assets/room_medium_A_interior_1.stl',
      'assets/room_medium_A_interior_2.stl',
      'assets/room_medium_A_interior_3.stl',
    ],
    scale: 0.015,
  },
  {
    shell: 'assets/room_small_A.stl',
    interiors: [
      'assets/room_small_A_interior_1.stl',
      'assets/room_small_A_interior_2.stl',
      'assets/room_small_A_interior_3.stl',
    ],
    scale: 0.015,
  },
];

const NUM_ROOMS = 9; // 3 of each size
const stlLoader = new STLLoader();
const roomGroups = [];

// Shared material factories — each mesh gets its own clone for individual opacity
function makeShellMat() {
  return new THREE.MeshLambertMaterial({
    color: 0x00ff00,
    transparent: true,
    opacity: 1.0,
    side: THREE.DoubleSide,
  });
}

function makeInteriorMat() {
  return new THREE.MeshLambertMaterial({
    color: 0x00ff00,
    transparent: true,
    opacity: 0.0,
    side: THREE.DoubleSide,
    depthWrite: false,
  });
}

function rng(min, max) { return min + Math.random() * (max - min); }

function spawnRoom(cfgIndex, interiorVariant) {
  const cfg = CONFIGS[cfgIndex];
  const group = new THREE.Group();

  // Spread randomly across a wide field
  group.position.set(rng(-22, 22), rng(-12, 12), rng(-5, 2));

  group.userData.vel = new THREE.Vector3(
    rng(-0.003, 0.003),
    rng(-0.003, 0.003),
    0
  );
  group.userData.rotVel = new THREE.Vector3(
    rng(-0.0015, 0.0015),
    rng(-0.0025,  0.0025),
    rng(-0.0008, 0.0008)
  );

  const intFile = cfg.interiors[interiorVariant % cfg.interiors.length];

  stlLoader.load(cfg.shell, geo => {
    geo.computeVertexNormals();
    geo.center();
    const mesh = new THREE.Mesh(geo, makeShellMat());
    mesh.scale.setScalar(cfg.scale);
    mesh.userData.role = 'shell';
    group.add(mesh);
  });

  stlLoader.load(intFile, geo => {
    geo.computeVertexNormals();
    geo.center();
    const mesh = new THREE.Mesh(geo, makeInteriorMat());
    mesh.scale.setScalar(cfg.scale);
    mesh.userData.role = 'interior';
    mesh.renderOrder = 1;
    group.add(mesh);
  });

  scene.add(group);
  roomGroups.push(group);
}

const BASE_SCALE = 0.015;
const BASE_SPEED = 1.0;
const BASE_COUNT = 9;
let currentScale = BASE_SCALE;
let currentSpeedMult = BASE_SPEED;
let currentCount = BASE_COUNT;

// Reset all sliders to 0 on load
window.addEventListener('load', () => {
  document.getElementById('interior-slider').value = 0;
  document.getElementById('size-slider').value = 0;
  document.getElementById('count-slider').value = 0;
  document.getElementById('speed-slider').value = 0;
});

function spawnRoom(cfgIndex, interiorVariant, scaleMult) {
  const cfg = CONFIGS[cfgIndex];
  const group = new THREE.Group();

  group.position.set(rng(-22, 22), rng(-12, 12), rng(-5, 2));

  const speed = BASE_SPEED;
  group.userData.baseVel = new THREE.Vector3(
    rng(-0.003, 0.003),
    rng(-0.003, 0.003),
    0
  );
  group.userData.vel = group.userData.baseVel.clone();
  group.userData.baseRotVel = new THREE.Vector3(
    rng(-0.0015, 0.0015),
    rng(-0.0025, 0.0025),
    rng(-0.0008, 0.0008)
  );
  group.userData.rotVel = group.userData.baseRotVel.clone();

  const s = cfg.scale * scaleMult;
  const intFile = cfg.interiors[interiorVariant % cfg.interiors.length];

  stlLoader.load(cfg.shell, geo => {
    geo.computeVertexNormals();
    geo.center();
    const mesh = new THREE.Mesh(geo, makeShellMat());
    mesh.scale.setScalar(s);
    mesh.userData.role = 'shell';
    group.add(mesh);
  });

  stlLoader.load(intFile, geo => {
    geo.computeVertexNormals();
    geo.center();
    const mesh = new THREE.Mesh(geo, makeInteriorMat());
    mesh.scale.setScalar(s);
    mesh.userData.role = 'interior';
    mesh.renderOrder = 1;
    group.add(mesh);
  });

  scene.add(group);
  roomGroups.push(group);
}

function clearRooms() {
  roomGroups.forEach(g => scene.remove(g));
  roomGroups.length = 0;
}

function spawnRooms(count, scaleMult) {
  clearRooms();
  for (let i = 0; i < count; i++) {
    const cfgIndex = i % CONFIGS.length;
    const interiorVariant = Math.floor(Math.random() * CONFIGS[cfgIndex].interiors.length);
    spawnRoom(cfgIndex, interiorVariant, scaleMult);
  }
}

// Initial spawn
spawnRooms(BASE_COUNT, 1.0);

// ── Interior slider ───────────────────────────────────────────────────
document.getElementById('interior-slider').addEventListener('input', function() {
  const t = this.value / 100;
  roomGroups.forEach(g => {
    g.children.forEach(mesh => {
      if (mesh.userData.role === 'shell') {
        mesh.material.opacity = 1 - t;
        mesh.material.depthWrite = (1 - t) > 0.5;
      }
      if (mesh.userData.role === 'interior') {
        mesh.material.opacity = t;
      }
    });
  });
});

// ── Size slider ───────────────────────────────────────────────────────
document.getElementById('size-slider').addEventListener('input', function() {
  // -100 → 0.2x, 0 → 1x, +100 → 5x
  const t = this.value / 100;
  const scaleMult = t >= 0 ? 1 + t * 4 : 1 + t * 0.8;
  currentScale = scaleMult;
  roomGroups.forEach(g => {
    g.children.forEach(mesh => {
      mesh.scale.setScalar(CONFIGS[0].scale * scaleMult);
    });
  });
});

// ── Count slider ──────────────────────────────────────────────────────
document.getElementById('count-slider').addEventListener('input', function() {
  // -100 → 1 room, 0 → 9 rooms, +100 → 20 rooms
  const t = this.value / 100;
  const newCount = t >= 0
    ? Math.round(BASE_COUNT + t * 11)
    : Math.max(1, Math.round(BASE_COUNT + t * 8));
  if (newCount !== currentCount) {
    currentCount = newCount;
    spawnRooms(newCount, currentScale);
  }
});

// ── Speed slider ──────────────────────────────────────────────────────
document.getElementById('speed-slider').addEventListener('input', function() {
  // -100 → 0.1x, 0 → 1x, +100 → 6x
  const t = this.value / 100;
  currentSpeedMult = t >= 0 ? 1 + t * 5 : 1 + t * 0.9;
  roomGroups.forEach(g => {
    g.userData.vel = g.userData.baseVel.clone().multiplyScalar(currentSpeedMult);
    g.userData.rotVel = g.userData.baseRotVel.clone().multiplyScalar(currentSpeedMult);
  });
});

// ── Drag interaction ──────────────────────────────────────────────────
// Enable pointer events on canvas so we can receive mouse clicks
canvas.style.pointerEvents = 'all';

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

let dragGroup = null;       // the room group being dragged
let dragPlane = new THREE.Plane(); // world-space plane at the room's Z depth
let dragOffset = new THREE.Vector3(); // offset from group origin to hit point
const _planeHit = new THREE.Vector3();

function getMouseNDC(e) {
  mouse.x =  (e.clientX / window.innerWidth)  * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
}

function getAllMeshes() {
  const meshes = [];
  roomGroups.forEach(g => g.children.forEach(m => meshes.push(m)));
  return meshes;
}

canvas.addEventListener('mousedown', e => {
  getMouseNDC(e);
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(getAllMeshes());
  if (hits.length > 0) {
    // Find the parent group
    dragGroup = hits[0].object.parent;
    // Build a plane facing the camera at the room's Z position
    dragPlane.setFromNormalAndCoplanarPoint(
      camera.getWorldDirection(new THREE.Vector3()).negate(),
      dragGroup.position
    );
    // Store offset so the room doesn't jump to cursor centre
    raycaster.ray.intersectPlane(dragPlane, _planeHit);
    dragOffset.subVectors(dragGroup.position, _planeHit);
    e.stopPropagation();
  }
});

window.addEventListener('mousemove', e => {
  if (!dragGroup) return;
  getMouseNDC(e);
  raycaster.setFromCamera(mouse, camera);
  if (raycaster.ray.intersectPlane(dragPlane, _planeHit)) {
    dragGroup.position.copy(_planeHit).add(dragOffset);
  }
});

window.addEventListener('mouseup', () => {
  dragGroup = null;
});

// ── Bounds (world units) — rooms wrap ─────────────────────────────────
const BX = 26, BY = 14;

// ── Animate ───────────────────────────────────────────────────────────
(function animate() {
  requestAnimationFrame(animate);

  roomGroups.forEach(g => {
    // Rotation always continues
    g.rotation.x += g.userData.rotVel.x;
    g.rotation.y += g.userData.rotVel.y;
    g.rotation.z += g.userData.rotVel.z;

    // Drift only when not being dragged
    if (g === dragGroup) return;
    g.position.addScaledVector(g.userData.vel, 1);
    if (g.position.x >  BX) g.position.x = -BX;
    if (g.position.x < -BX) g.position.x =  BX;
    if (g.position.y >  BY) g.position.y = -BY;
    if (g.position.y < -BY) g.position.y =  BY;
  });

  renderer.render(scene, camera);
})();

// ── Resize ────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
